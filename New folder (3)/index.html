  <!-- تگ های اچ ها به ترتیب از 1 تا 6 اهمیت مهمتری بر خوردار هستند و در سءو سایت تگ اچ ۱ مهم تر هست  -->
  <h1>درود</h1>
  <!--تگ اچ دو کلید میانبر تمیز کردن کد با اکستنشن هست -->
  <h2>alt + shift + f</h2>
  <body>
    <!-- با کنترل خودش سیو میشه و مرتب میشه کد ها -->

    <!-- با کنترل و اسلش خودش کامنت گزاری میشه  -->
    <!-- تگ بی بولد میشه  -->
    <b>hello</b>
    <br />
    <br />
    <br />
    <p>
      Lorem ipsum <b>dolor</b>, sit amet consectetur adipisicing
      <strong>elit</strong> . Illo, provident.
    </p>
    <!-- 
    تگ 
     strong 
     به  لحاظ سءو مهم تر از تگ
      b
       هست  
    -->

    <small>welcom</small>
    <br />
    <br />
    <mark>htnk css</mark>
    <br />
    <br />
    <del>125000</del>
    <br />
    <br />
    <ins>123546</ins>
    <br /><br />
    <br />

    <p>h<sub>2</sub>o</p>
    <p>x <sup>10</sup></p>
    <br />
    <br />

    <!-- external link (a)  -->
    <a href="www.google.com"> google </a>
    <br />
    <br />

    <!-- 
به طور پیشفرض بدون دستور 
target
ادرس لینک توی خود سایت من باز میشه 
اما با تگ
target 
و با قرار دادن روی 
_blank 
در تب جددی مروگر صفحه جدید باز میشه     

-->

0    <a href="www.google.com" target="_blank"> google </a>
    <br />

    <br />

    <a href="./about.html">aaaa</a>
