# Clash Verge Configuration File

port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: '127.0.0.1:9090'

proxies:
  # اتصال از طریق پروتکل Socks5
  - name: "Socks5-Proxy"
    type: socks5
    server: 192.168.100.42
    port: 10808
    udp: true

  # اتصال از طریق پروتکل HTTP
  - name: "HTTP-Proxy"
    type: http
    server: 192.168.100.42
    port: 10808

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - "Socks5-Proxy"
      - "HTTP-Proxy"
      - DIRECT

rules:
  # قوانین پایه برای هدایت ترافیک (می‌توانید قوانین خود را اضافه کنید)
  - DOMAIN-SUFFIX,google.com,PROXY
  - MATCH,PROXY
